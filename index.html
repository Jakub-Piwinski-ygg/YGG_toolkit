<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YGG Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0e0f;--surface:#18181b;--surface2:#1f1f24;--border:#2a2a30;
  --accent:#FF762E;--accent2:#47c8ff;--accent3:#ff6b47;
  --text:#f0f0f0;--muted:#888;
  --font-mono:'DM Mono',monospace;--font-display:'Syne',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-display);min-height:100vh;display:flex;flex-direction:column;padding:2rem;gap:1.5rem}
header{display:flex;align-items:center;gap:1rem;border-bottom:1px solid var(--border);padding-bottom:1rem;flex-wrap:wrap}
.header-logo{display:flex;align-items:center;gap:.75rem}
h1{font-size:clamp(1.4rem,3vw,2rem);font-weight:800;letter-spacing:-0.03em;color:var(--accent)}
.subtitle{font-size:.8rem;color:var(--muted);font-family:var(--font-mono)}
.subtitle-link{cursor:pointer;transition:color .15s;border-bottom:1px solid transparent;padding-bottom:1px}
.subtitle-link:hover{color:var(--accent);border-bottom-color:var(--accent)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:.5rem}
.wasm-badge{font-family:var(--font-mono);font-size:.65rem;padding:.25rem .6rem;border-radius:3px;border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;gap:.4rem}
.wasm-badge .dot{width:6px;height:6px;border-radius:50%;background:#555;transition:background .3s}
.wasm-badge.loading .dot{background:var(--accent);animation:pulse 1s infinite}
.wasm-badge.ready .dot{background:#4cff88}
.wasm-badge.error .dot{background:var(--accent3)}
.restart-btn{font-family:var(--font-mono);font-size:.65rem;padding:.25rem .6rem;border-radius:3px;border:1px solid var(--border);color:var(--muted);background:transparent;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:.35rem}
.restart-btn:hover{border-color:#666;color:var(--text)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.app-layout{display:grid;grid-template-columns:280px 1fr;gap:1.5rem;flex:1}
@media(max-width:900px){.app-layout{grid-template-columns:1fr}}
.sidebar{display:flex;flex-direction:column;gap:.8rem}
.tool-tabs{display:flex;flex-direction:column;gap:.3rem}
.tool-tab{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.7rem 1rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:.7rem;font-family:var(--font-mono);font-size:.78rem;color:var(--muted);text-align:left;width:100%}
.tool-tab:hover{border-color:#444;color:var(--text)}
.tool-tab.active{border-color:var(--accent);color:var(--accent);background:#1a1208}
.tool-tab .icon{font-size:1rem;width:20px;text-align:center}
.tool-tab .label{font-weight:500;display:flex;flex-direction:column;gap:.1rem}
.tool-tab .label small{color:#555;font-size:.6rem;font-weight:400}
.tool-tab.active .label small{color:#a06040}
.dropzone{background:var(--surface);border:1px dashed var(--border);border-radius:8px;padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:all .2s;font-family:var(--font-mono);font-size:.72rem;color:var(--muted);line-height:1.8}
.dropzone:hover,.dropzone.drag-over{border-color:var(--accent2);color:var(--accent2);background:#141419}
.dropzone .drop-icon{font-size:1.8rem;margin-bottom:.5rem;display:block}
#fileInput{display:none}
.file-list{display:flex;flex-direction:column;gap:.3rem;max-height:180px;overflow-y:auto}
.file-item{background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:.4rem .6rem;font-family:var(--font-mono);font-size:.68rem;color:var(--muted);display:flex;align-items:center;gap:.5rem}
.file-item .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.file-item .fsize{color:#555}
.file-item .fremove{cursor:pointer;color:#444;transition:color .15s;padding:0 .2rem}
.file-item .fremove:hover{color:var(--accent3)}
.main-panel{display:flex;flex-direction:column;gap:1rem}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.panel-header span{color:var(--accent2);font-weight:500}
.settings-body{padding:1.2rem;display:flex;flex-direction:column;gap:1.2rem}
.tool-section{display:none;flex-direction:column;gap:1rem}
.tool-section.active{display:flex}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.field{display:flex;flex-direction:column;gap:.4rem}
.field label{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.field input[type=number],.field input[type=text],.field select{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:.82rem;padding:.5rem .7rem;border-radius:4px;outline:none;transition:border-color .15s;width:100%}
.field input[type=range]{background:transparent;border:none;width:100%;cursor:pointer;accent-color:var(--accent);padding:.3rem 0}
.field input:focus,.field select:focus{border-color:var(--accent2)}
.btn{font-family:var(--font-mono);font-size:.72rem;letter-spacing:.05em;padding:.5rem 1.1rem;border-radius:4px;border:1px solid var(--border);cursor:pointer;transition:all .15s;background:transparent;color:var(--muted)}
.btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
.btn-primary:hover:not(:disabled){background:#e8621a;border-color:#e8621a}
.btn-replace{color:var(--accent2);border-color:rgba(71,200,255,.3)}
.btn-replace:hover:not(:disabled){border-color:var(--accent2);color:var(--accent2);background:rgba(71,200,255,.07)}
.btn-replace-confirm{color:#4cff88 !important;border-color:rgba(76,255,136,.5) !important;background:rgba(76,255,136,.07) !important;animation:confirmPop .25s ease}
@keyframes confirmPop{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
.action-row{display:flex;gap:.6rem;align-items:center;flex-wrap:wrap}
.progress-label{font-family:var(--font-mono);font-size:.7rem;color:var(--muted);margin-left:auto}
.output-log{background:var(--surface2);border-radius:4px;padding:.8rem 1rem;font-family:var(--font-mono);font-size:.72rem;color:var(--muted);max-height:120px;overflow-y:auto;line-height:1.7}
.log-line{display:block}
.log-line.ok{color:#4cff88}
.log-line.err{color:var(--accent3)}
.log-line.info{color:var(--accent2)}
.results-grid{display:flex;flex-wrap:wrap;gap:.8rem;padding:1rem}
.result-card{background:var(--surface2);border:1px solid var(--border);border-radius:6px;overflow:hidden;width:130px;display:flex;flex-direction:column;cursor:pointer;transition:border-color .15s}
.result-card:hover{border-color:var(--accent2)}
.result-card img{width:100%;height:100px;object-fit:contain;background:#111;display:block}
.result-card .rc-label{padding:.3rem .5rem;font-family:var(--font-mono);font-size:.58rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-top:1px solid var(--border)}
.empty-state{color:#444;font-family:var(--font-mono);font-size:.8rem;padding:2rem;text-align:center}
.dl-bar{display:flex;gap:.6rem;padding:.75rem 1rem;border-top:1px solid var(--border);align-items:center;flex-wrap:wrap}
.dl-bar .dl-info{font-family:var(--font-mono);font-size:.7rem;color:var(--muted);margin-right:auto}
.separator{height:1px;background:var(--border)}
.tool-desc{font-family:var(--font-mono);font-size:.72rem;color:#555;line-height:1.6}
/* ── Crop / Canvas Resize mode indicator ── */
.crop-mode-hint{font-family:var(--font-mono);font-size:.65rem;padding:.35rem .6rem;border-radius:4px;border:1px solid var(--border);display:flex;align-items:center;gap:.45rem;transition:all .25s}
.crop-mode-hint.mode-crop{border-color:rgba(255,118,46,.35);background:rgba(255,118,46,.06);color:var(--accent)}
.crop-mode-hint.mode-pad{border-color:rgba(71,200,255,.35);background:rgba(71,200,255,.06);color:var(--accent2)}
.crop-mode-hint .mode-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.crop-mode-hint.mode-crop .mode-dot{background:var(--accent)}
.crop-mode-hint.mode-pad .mode-dot{background:var(--accent2)}
.btn-match{color:var(--accent2);border-color:rgba(71,200,255,.3);font-size:.65rem;padding:.4rem .8rem}
.btn-match:hover:not(:disabled){border-color:var(--accent2);color:var(--accent2);background:rgba(71,200,255,.07)}
/* RGBA */
.rgba-slots-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.rgba-slot{background:var(--surface2);border:1px solid var(--border);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s}
.rgba-slot:hover{border-color:var(--ch-color,var(--border))}
.slot-header{display:flex;align-items:center;gap:.5rem;padding:.4rem .6rem;border-bottom:1px solid var(--border)}
.slot-badge{font-family:var(--font-mono);font-size:.65rem;font-weight:700;padding:.1rem .4rem;border-radius:3px;border:1px solid;letter-spacing:.05em;flex-shrink:0}
.slot-hint{font-family:var(--font-mono);font-size:.56rem;color:#444;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.slot-preview{width:100%;height:80px;background:#111;display:flex;align-items:center;justify-content:center;overflow:hidden}
.slot-thumb{width:100%;height:100%;object-fit:contain;display:block;filter:grayscale(1);opacity:.85}
.slot-empty-thumb{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;width:100%}
.slot-select{background:var(--surface);border:none;border-top:1px solid var(--border);color:var(--muted);font-family:var(--font-mono);font-size:.65rem;padding:.4rem .5rem;outline:none;cursor:pointer;width:100%}
.slot-select:hover,.slot-select:focus{color:var(--text)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}

/* ═══ Font Preview Tool Styles ═══ */
.fp-controls-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem;align-items:end}
.fp-letter-builder{display:flex;flex-direction:column;gap:.5rem}
.fp-letter-builder-header{display:flex;align-items:center;justify-content:space-between;font-family:var(--font-mono);font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.fp-letter-list{display:flex;flex-direction:column;gap:.4rem;max-height:260px;overflow-y:auto;padding-right:2px}
.fp-letter-row{display:grid;grid-template-columns:28px 1fr 28px;gap:.4rem;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:.3rem .5rem;transition:border-color .15s}
.fp-letter-row:hover{border-color:#3a3a42}
.fp-letter-idx{font-family:var(--font-mono);font-size:.6rem;color:#444;text-align:center;flex-shrink:0}
.fp-letter-select{background:transparent;border:none;color:var(--text);font-family:var(--font-mono);font-size:.72rem;outline:none;cursor:pointer;width:100%;padding:.1rem 0}
.fp-letter-select option{background:var(--surface2)}
.fp-letter-thumb{width:24px;height:24px;object-fit:contain;border-radius:2px;display:block;flex-shrink:0;background:#111;border:1px solid var(--border)}
.fp-letter-thumb-empty{width:24px;height:24px;background:var(--surface);border:1px solid var(--border);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fp-length-row{display:flex;align-items:center;gap:.6rem}
.fp-length-row label{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);white-space:nowrap;text-transform:uppercase;letter-spacing:.08em}
.fp-length-row input{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:.82rem;padding:.4rem .6rem;border-radius:4px;outline:none;width:70px;transition:border-color .15s}
.fp-length-row input:focus{border-color:var(--accent2)}
.fp-gradient-row{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.fp-color-field{display:flex;flex-direction:column;gap:.4rem}
.fp-color-field label{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.fp-color-swatch{display:flex;align-items:center;gap:.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:.35rem .6rem;cursor:pointer;transition:border-color .15s}
.fp-color-swatch:hover{border-color:#444}
.fp-color-dot{width:18px;height:18px;border-radius:3px;border:1px solid rgba(255,255,255,.12);flex-shrink:0;transition:background .15s}
.fp-color-val{font-family:var(--font-mono);font-size:.72rem;color:var(--muted)}
.fp-color-input{position:absolute;opacity:0;width:0;height:0;pointer-events:none}
.fp-preview-panel{background:var(--surface2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.fp-preview-label{font-family:var(--font-mono);font-size:.6rem;color:#444;text-transform:uppercase;letter-spacing:.08em;padding:.4rem .7rem;border-bottom:1px solid var(--border)}
.fp-preview-canvas-wrap{padding:.75rem;display:flex;align-items:center;justify-content:center;min-height:80px}
#fpPreviewCanvas{border-radius:4px;max-width:100%;display:block;image-rendering:pixelated}
</style>
</head>
<body>

<header>
  <div class="header-logo" style="display:flex;align-items:center;gap:12px">
    <a href="https://yggdrasilgaming.com">
      <img src="https://yggdrasilgaming.com/w/files/2020/07/symbol.png"
           alt="Yggdrasil Gaming Logo" style="width:70px;display:block">
    </a>
    <div>
      <h1>YGG&nbsp;&nbsp;&nbsp;TOOLKIT</h1>
      <span class="subtitle">
        <span class="subtitle-link" onclick="switchTool('crop')">crop</span> ·
        <span class="subtitle-link" onclick="switchTool('blur')">blur</span> ·
        <span class="subtitle-link" onclick="switchTool('webp')">convert</span> ·
        <span class="subtitle-link" onclick="switchTool('rgba')">rgba mask</span> ·
        <span class="subtitle-link" onclick="switchTool('fontpreview')">font preview</span> ·
        <span class="subtitle-link" onclick="switchTool('slotmachine')">slot machine</span>
      </span>
    </div>
  </div>
  <div class="header-right">
    <div class="wasm-badge loading" id="wasmBadge">
      <div class="dot"></div>
      <span id="wasmStatus">loading wasm…</span>
    </div>
    <button class="restart-btn" title="Restart toolkit — loaded files are preserved" onclick="restartToolkit()">&#8635; restart</button>
  </div>
</header>

<div class="app-layout">
  <div class="sidebar">
    <!-- Files first, tools below -->
    <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
      <span class="drop-icon">📂</span>
      drop PNG files here<br>or click to browse
    </div>
    <input type="file" id="fileInput" accept=".png,image/png" multiple>
    <div class="file-list" id="fileList"></div>
    <div id="fileCount" style="font-family:var(--font-mono);font-size:.65rem;color:#555;text-align:center"></div>
    <div class="separator"></div>
    <div class="tool-tabs" id="toolTabs"></div>
  </div>

  <div class="main-panel">
    <div class="panel">
      <div class="panel-header">settings <span id="toolName"></span></div>
      <div class="settings-body" id="settingsBody">
        <!-- tool sections injected before action-row -->
        <div class="action-row">
          <button class="btn btn-primary" id="runBtn" disabled>&#9654; RUN</button>
          <button class="btn" id="clearBtn">CLEAR</button>
          <span class="progress-label" id="progressLabel"></span>
        </div>
        <div class="output-log" id="outputLog">
          <span class="log-line info">&#8212; loading ImageMagick WASM&#8230; &#8212;</span>
        </div>
      </div>
    </div>

    <div class="panel" style="flex:1">
      <div class="panel-header">output <span id="resultCount">0 files</span></div>
      <div id="resultsArea" style="min-height:150px">
        <div class="empty-state">processed images will appear here</div>
      </div>
      <div class="dl-bar" id="dlBar" style="display:none">
        <span class="dl-info" id="dlInfo"></span>
        <button class="btn btn-replace" id="replaceBtn" onclick="replaceFilesWithOutput()">&#8645; REPLACE LOADED FILES</button>
        <button class="btn btn-primary" id="dlAllBtn">&#8681; DOWNLOAD ALL</button>
      </div>
    </div>
  </div>
</div>


<!-- ═══ core/state.js ═══ -->
<script>
const state = { magickReady:false, currentTool:'crop', inputFiles:[], outputFiles:[] };
const _EV = {};
function on(e,fn){ (_EV[e]=_EV[e]||[]).push(fn); }
function emit(e,d){ (_EV[e]||[]).forEach(fn=>fn(d)); }
</script>

<!-- ═══ core/ui.js ═══ -->
<script>
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function log(msg,type=''){
  const el=document.getElementById('outputLog'),ln=document.createElement('span');
  ln.className='log-line '+type; ln.textContent=msg;
  el.appendChild(ln); el.appendChild(document.createElement('br')); el.scrollTop=el.scrollHeight;
}
function clearLog(){ document.getElementById('outputLog').innerHTML=''; }
function setBadge(mode,text){
  document.getElementById('wasmBadge').className='wasm-badge '+mode;
  document.getElementById('wasmStatus').textContent=text;
}
function updateRunBtn(){
  const tool=typeof TOOLS!=='undefined'&&TOOLS.find(t=>t.meta.id===state.currentTool);
  const needsWasm=tool?tool.meta.needsMagick:true;
  document.getElementById('runBtn').disabled=state.inputFiles.length===0||(needsWasm&&!state.magickReady);
}
function renderFileList(){
  document.getElementById('fileList').innerHTML=state.inputFiles.map(f=>`
    <div class="file-item">
      <span class="fname">${esc(f.name)}</span>
      <span class="fsize">${(f.file.size/1024).toFixed(0)}k</span>
      <span class="fremove" onclick="removeFile('${esc(f.name)}')">&#10005;</span>
    </div>`).join('');
  const n=state.inputFiles.length;
  document.getElementById('fileCount').textContent=n?`${n} file${n>1?'s':''} loaded`:'';
  emit('filesChanged');
}
function renderResults(){
  const area=document.getElementById('resultsArea'),n=state.outputFiles.length;
  document.getElementById('resultCount').textContent=n+' file'+(n!==1?'s':'');
  if(!n){ area.innerHTML='<div class="empty-state">no output files generated</div>'; document.getElementById('dlBar').style.display='none'; return; }
  const kb=state.outputFiles.reduce((s,f)=>s+f.blob.size,0);
  document.getElementById('dlInfo').textContent=`${n} file${n>1?'s':''} \u00b7 ${(kb/1024).toFixed(0)} KB total`;
  area.innerHTML='<div class="results-grid">'+state.outputFiles.map(f=>`
    <div class="result-card" onclick="downloadOne('${esc(f.name)}')" title="Click to download">
      <img src="${f.url}" alt="${esc(f.name)}" loading="lazy">
      <div class="rc-label">${esc(f.name)}</div>
    </div>`).join('')+'</div>';
  document.getElementById('dlBar').style.display='flex';
  // Reset replace button state whenever results refresh
  const replBtn=document.getElementById('replaceBtn');
  replBtn.className='btn btn-replace';
  replBtn.innerHTML='&#8645; REPLACE LOADED FILES';
}
function clearResults(){
  state.outputFiles.forEach(f=>URL.revokeObjectURL(f.url)); state.outputFiles=[];
  document.getElementById('resultsArea').innerHTML='<div class="empty-state">processed images will appear here</div>';
  document.getElementById('resultCount').textContent='0 files';
  document.getElementById('dlBar').style.display='none';
  document.getElementById('progressLabel').textContent='';
  clearLog(); log('\u2014 ready \u2014','info');
}
function triggerDl(url,name){ const a=document.createElement('a'); a.href=url; a.download=name; a.click(); }
async function downloadAll(){ for(const f of state.outputFiles){ triggerDl(f.url,f.name); await new Promise(r=>setTimeout(r,80)); } }
function downloadOne(name){ const f=state.outputFiles.find(x=>x.name===name); if(f) triggerDl(f.url,f.name); }
function getImageDimensions(uint8){
  return new Promise((resolve,reject)=>{
    const blob=new Blob([uint8],{type:'image/png'}),url=URL.createObjectURL(blob),img=new Image();
    img.onload=()=>{ URL.revokeObjectURL(url); resolve({w:img.naturalWidth,h:img.naturalHeight}); };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('Could not read dimensions')); };
    img.src=url;
  });
}

// ── Replace loaded files with output ──────────────────────────────────────────
let _replaceConfirmTimer = null;
function replaceFilesWithOutput(){
  const btn = document.getElementById('replaceBtn');
  if(!btn.classList.contains('btn-replace-confirm')){
    // First click — ask for confirmation
    clearTimeout(_replaceConfirmTimer);
    btn.classList.remove('btn-replace');
    btn.classList.add('btn-replace-confirm');
    btn.textContent = '✓ CONFIRM REPLACE';
    _replaceConfirmTimer = setTimeout(()=>{
      btn.classList.remove('btn-replace-confirm');
      btn.classList.add('btn-replace');
      btn.innerHTML = '&#8645; REPLACE LOADED FILES';
    }, 3000);
    return;
  }
  // Confirmed — swap output → input
  clearTimeout(_replaceConfirmTimer);
  const outputSnapshot = [...state.outputFiles];
  // Revoke old input blob URLs
  state.inputFiles.forEach(f => URL.revokeObjectURL(f.url));
  // Build new input entries from output blobs
  const newFiles = outputSnapshot.map(o => ({
    name: o.name,
    file: new File([o.blob], o.name, {type:'image/png'}),
    url: URL.createObjectURL(o.blob)
  }));
  // Clear output state (but keep blob URLs alive — they're now used by input)
  state.outputFiles = [];
  document.getElementById('resultsArea').innerHTML = '<div class="empty-state">processed images will appear here</div>';
  document.getElementById('resultCount').textContent = '0 files';
  document.getElementById('dlBar').style.display = 'none';
  document.getElementById('progressLabel').textContent = '';
  clearLog();
  // Load new inputs
  state.inputFiles = newFiles;
  renderFileList();
  updateRunBtn();
  if(state.currentTool === 'fontpreview' || state.currentTool === 'slotmachine') document.getElementById('runBtn').disabled = false;
  log(`\u2713 ${newFiles.length} output file${newFiles.length!==1?'s':''} loaded as input`, 'ok');
}

// ── Restart toolkit (preserve loaded files) ───────────────────────────────────
function restartToolkit(){
  const savedFiles = [...state.inputFiles];
  // Revoke output URLs
  state.outputFiles.forEach(f => URL.revokeObjectURL(f.url));
  state.outputFiles = [];
  document.getElementById('resultsArea').innerHTML = '<div class="empty-state">processed images will appear here</div>';
  document.getElementById('resultCount').textContent = '0 files';
  document.getElementById('dlBar').style.display = 'none';
  document.getElementById('progressLabel').textContent = '';
  state.inputFiles = savedFiles;
  renderFileList();
  switchTool(state.currentTool);
  updateRunBtn();
  if(state.currentTool === 'fontpreview' || state.currentTool === 'slotmachine') document.getElementById('runBtn').disabled = false;
  clearLog();
  log('\u2014 restarted \u2014 loaded files preserved \u2014', 'info');
}
</script>

<script>
async function cropMatchFirstImage(){
  if(!state.inputFiles.length) return;
  const first = state.inputFiles[0];
  const dims = await getImageDimensions(new Uint8Array(await first.file.arrayBuffer()));
  document.getElementById('crop-w').value = dims.w;
  document.getElementById('crop-h').value = dims.h;
  cropUpdateModeHint();
  log(`✓ matched first image: ${dims.w} × ${dims.h} px`, 'ok');
}

async function cropUpdateModeHint(){
  const hint = document.getElementById('crop-mode-hint');
  if(!hint) return;
  const tw = parseInt(document.getElementById('crop-w')?.value)||0;
  const th = parseInt(document.getElementById('crop-h')?.value)||0;
  if(!state.inputFiles.length || !tw || !th){
    hint.className='crop-mode-hint';
    hint.innerHTML='<span class="mode-dot"></span><span>load files to preview mode</span>';
    return;
  }
  try{
    const dims = await getImageDimensions(new Uint8Array(await state.inputFiles[0].file.arrayBuffer()));
    const willCrop = tw < dims.w || th < dims.h;
    const willPad  = tw > dims.w || th > dims.h;
    if(willCrop && willPad){
      hint.className='crop-mode-hint mode-crop';
      hint.innerHTML='<span class="mode-dot"></span><span>mixed — crop on one axis, pad on other</span>';
    } else if(willCrop){
      hint.className='crop-mode-hint mode-crop';
      hint.innerHTML='<span class="mode-dot"></span><span>will CENTER CROP (target smaller than source)</span>';
    } else if(willPad){
      hint.className='crop-mode-hint mode-pad';
      hint.innerHTML='<span class="mode-dot"></span><span>will PAD with transparency (target larger than source)</span>';
    } else {
      hint.className='crop-mode-hint mode-pad';
      hint.innerHTML='<span class="mode-dot"></span><span>same size — no change</span>';
    }
  } catch(e){ /* ignore */ }
}

const ToolCrop={
  meta:{id:'crop',label:'Canvas Resize',small:'crop or pad to exact size',icon:'✂️',needsMagick:true,batchMode:false,
    desc:'Resizes the canvas of each PNG to exact pixel dimensions. If the target is <em>smaller</em> than the source the image is center-cropped; if <em>larger</em>, transparent pixels are added around the image to reach the target size.'},
  settingsHTML(){return`
    <div class="field-row">
      <div class="field">
        <label>Width (px)</label>
        <input type="number" id="crop-w" value="256" min="1" max="8192" oninput="cropUpdateModeHint()">
      </div>

        <input type="number" id="crop-h" value="256" min="1" max="8192" oninput="cropUpdateModeHint()">

    <div style="display:flex;align-items:center;gap:.6rem;flex-wrap:wrap">
      <button class="btn btn-match" id="cropMatchBtn" onclick="cropMatchFirstImage()" ${state.inputFiles.length?'':'disabled'}>

  outName(n){return n.replace(/\.png$/i,'')+'_resized.png';},
  async run(uint8){
    const tw=parseInt(document.getElementById('crop-w').value)||256;
    const th=parseInt(document.getElementById('crop-h').value)||256;
    // -extent with gravity Center: crops if target < source, pads if target > source
    // -background transparent ensures padding is fully transparent
    const r = await window._Magick.Call(

<script>
const ToolBlur={
  meta:{id:'blur',label:'Directional Blur',small:'motion blur with feathering',icon:'&#128168;',needsMagick:true,batchMode:false,
    desc:'Applies directional motion blur — edges fade to transparent so the blur blends naturally with surroundings.'},
  settingsHTML(){return`<div class="field-row">
    <div class="field"><label>Radius</label><input type="number" id="blur-radius" value="0" min="0" max="50"></div>
    <div class="field"><label>Sigma (strength)</label><input type="number" id="blur-sigma" value="12" min="1" max="100"></div>
    </div><div class="field-row">
    <div class="field"><label>Angle &mdash; <span id="blur-angle-val" style="color:var(--accent)">90&deg;</span></label>
      <input type="range" id="blur-angle" value="90" min="0" max="360" oninput="document.getElementById('blur-angle-val').textContent=this.value+'&deg;'"></div>
    <div class="field"><label>Edge Feather (px)</label><input type="number" id="blur-feather" value="5" min="0" max="100"></div>
    </div>`;},
  outName(n){return n.replace(/\.png$/i,'')+'_blur.png';},
  async run(uint8){
    const radius=document.getElementById('blur-radius').value||'0',sigma=document.getElementById('blur-sigma').value||'12',
          angle=document.getElementById('blur-angle').value||'90',feather=document.getElementById('blur-feather').value||'5';
    const blurArg=`${radius}x${sigma}+${angle}`,fresh=async b=>new Uint8Array(await b.arrayBuffer());
    const r1=await window._Magick.Call([{name:'input.png',content:uint8}],['convert','input.png','-motion-blur',blurArg,'blurred.png']);
    if(!r1||!r1.length) throw new Error('Motion blur failed');
    const blurred=r1[0].blob;
    const r2=await window._Magick.Call([{name:'blurred.png',content:await fresh(blurred)}],
      ['convert','blurred.png','-alpha','off','-fill','white','-colorize','100','-shave',`${feather}x${feather}`,'-bordercolor','black','-border',`${feather}x${feather}`,'-blur',`0x${feather}`,'-level','20%,80%','mask.png']);
    if(!r2||!r2.length) throw new Error('Mask creation failed');
    const mask=r2[0].blob;
    const r3=await window._Magick.Call([{name:'blurred.png',content:await fresh(blurred)}],['convert','blurred.png','-alpha','extract','orig_alpha.png']);
    if(!r3||!r3.length) throw new Error('Alpha extract failed');
    const alpha=r3[0].blob;
    const r4=await window._Magick.Call([{name:'orig_alpha.png',content:await fresh(alpha)},{name:'mask.png',content:await fresh(mask)}],
      ['convert','orig_alpha.png','mask.png','-compose','Multiply','-composite','combined_alpha.png']);
    if(!r4||!r4.length) throw new Error('Alpha multiply failed');
    const cAlpha=r4[0].blob;
    const r5=await window._Magick.Call([{name:'blurred.png',content:await fresh(blurred)},{name:'combined_alpha.png',content:await fresh(cAlpha)}],
      ['convert','blurred.png','combined_alpha.png','-alpha','copy','-compose','CopyOpacity','-composite','output.png']);
    if(!r5||!r5.length) throw new Error('Final composite failed');
    return r5[0].blob;
  }
};
</script>

<script>
const _slots={R:null,G:null,B:null,A:null};
const CH_COLOR={R:'#ff4455',G:'#44ff88',B:'#4499ff',A:'#cccccc'};
const CH_HINT={R:'e.g. Metallic',G:'e.g. Roughness',B:'e.g. AO',A:'e.g. Height'};

function rgbaRender(){

    }
    return`<div class="rgba-slot" style="--ch-color:${col}">

    </div>`;

}
function rgbaSetSlot(ch,val){ _slots[ch]=val||null; rgbaRender(); }
on('filesChanged',()=>{

  rgbaRender();

const ToolRgba={
  meta:{id:'rgba',label:'RGBA Mask Combiner',small:'pack textures into channels',icon:'&#127912;',needsMagick:false,batchMode:true,
    desc:'Packs up to 4 greyscale PNG textures into a single RGBA image \u2014 one texture per channel. Perfect for PBR mask maps (metallic, roughness, AO, height).'},
  settingsHTML(){return`
    <div id="rgba-slots" class="rgba-slots-grid"></div>
    <div class="field">
      <label>Output filename</label>
      <input type="text" id="rgba-outname" value="mask_rgba">
      <span style="font-family:var(--font-mono);font-size:.6rem;color:#555;margin-top:.2rem;display:block">.png appended automatically</span>
    </div>`;},
  outName(){const base=(document.getElementById('rgba-outname')?.value||'mask_rgba').trim(); return(base||'mask_rgba')+'.png';},
  async run(_u,_n,_f,allFiles){
    async function toGrey(entry){
      return new Promise((resolve,reject)=>{
        const img=new Image();
        img.onload=()=>{
          const c=document.createElement('canvas'); c.width=img.naturalWidth; c.height=img.naturalHeight;
          const ctx=c.getContext('2d'); ctx.drawImage(img,0,0); URL.revokeObjectURL(img.src);
          const d=ctx.getImageData(0,0,c.width,c.height).data,g=new Uint8Array(c.width*c.height);
          for(let i=0;i<g.length;i++) g[i]=Math.round(0.2126*d[i*4]+0.7152*d[i*4+1]+0.0722*d[i*4+2]);
          resolve({grey:g,w:c.width,h:c.height});
        };
        img.onerror=()=>reject(new Error('Failed to load '+entry.name));
        img.src=entry.url;
      });
    }
    const ch={};let refW=0,refH=0;
    for(const k of ['R','G','B','A']){
      if(_slots[k]){
        const entry=allFiles.find(f=>f.name===_slots[k]);
        if(!entry) throw new Error(`Channel ${k}: "${_slots[k]}" not found`);
        ch[k]=await toGrey(entry); if(!refW){refW=ch[k].w;refH=ch[k].h;}
      }
    }
    if(!refW) throw new Error('No channels assigned \u2014 assign at least one texture to a slot');
    const canvas=document.createElement('canvas'); canvas.width=refW; canvas.height=refH;
    const ctx=canvas.getContext('2d'),out=ctx.createImageData(refW,refH),data=out.data;
    for(let i=0;i<refW*refH;i++){
      data[i*4]=ch.R?ch.R.grey[i]:0; data[i*4+1]=ch.G?ch.G.grey[i]:0;
      data[i*4+2]=ch.B?ch.B.grey[i]:0; data[i*4+3]=ch.A?ch.A.grey[i]:255;
    }
    ctx.putImageData(out,0,0);
    return new Promise((resolve,reject)=>{ canvas.toBlob(b=>b?resolve(b):reject(new Error('toBlob failed')),'image/png'); });
  }
};
</script>

<script>
// Font Preview tool — replicates ImageText.cs engine behaviour
// Layout rules from the C# source:
//   1. Each letter image height is scaled to `size` px (width preserves aspect ratio)
//   2. Letter x-position = totalWidth + characterOffset * letterIndex  (left-pivot)
//   3. After all letters placed, the whole string is shifted left by totalWidth/2 (centered)
//   4. If totalWidth > canvasW OR totalHeight > canvasH → uniform scale-down to fit
//   5. Canvas has a vertical gradient background between two user-chosen colours

const _fpLetterAssignments = []; // array of filename|null, length = current text length
let _fpLength = 4;

function fpHexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function fpBuildLetterOptions(selected){
  const none=`<option value="">— unassigned —</option>`;
  const opts=state.inputFiles.map(f=>`<option value="${esc(f.name)}"${f.name===selected?' selected':''}>${esc(f.name)}</option>`).join('');
  return none+opts;
}

function fpRenderLetterList(){
  const el=document.getElementById('fp-letter-list'); if(!el) return;
  // Sync array length
  while(_fpLetterAssignments.length < _fpLength) _fpLetterAssignments.push(null);
  while(_fpLetterAssignments.length > _fpLength) _fpLetterAssignments.pop();

  el.innerHTML=_fpLetterAssignments.map((assigned,i)=>{
    const entry=assigned?state.inputFiles.find(f=>f.name===assigned):null;
    const thumb=entry
      ?`<img src="${entry.url}" class="fp-letter-thumb" alt="">`
      :`<div class="fp-letter-thumb-empty"><span style="font-size:.7rem;color:#333">?</span></div>`;
    return`<div class="fp-letter-row">
      <span class="fp-letter-idx">${i+1}</span>
      <select class="fp-letter-select" data-idx="${i}" onchange="fpSetLetter(${i},this.value)">${fpBuildLetterOptions(assigned||'')}</select>
      ${thumb}
    </div>`;
  }).join('');
  fpUpdatePreview();
}

function fpSetLetter(idx,val){
  _fpLetterAssignments[idx]=val||null;
  fpRenderLetterList();
}

function fpSetLength(n){
  _fpLength=Math.max(1,Math.min(32,parseInt(n)||1));
  fpRenderLetterList();
}

on('filesChanged',()=>{
  // Drop assignments for removed files
  for(let i=0;i<_fpLetterAssignments.length;i++){
    if(_fpLetterAssignments[i]&&!state.inputFiles.find(f=>f.name===_fpLetterAssignments[i])){
      _fpLetterAssignments[i]=null;
    }
  }
  if(state.currentTool==='fontpreview') fpRenderLetterList();
});

// Live preview on a small canvas (scaled down for the UI panel)
async function fpUpdatePreview(){
  const canvas=document.getElementById('fpPreviewCanvas'); if(!canvas) return;
  const bgTop=document.getElementById('fp-bg-top')?.value||'#1a1a2e';
  const bgBot=document.getElementById('fp-bg-bot')?.value||'#16213e';
  const size=parseInt(document.getElementById('fp-size')?.value)||100;
  const offset=parseFloat(document.getElementById('fp-offset')?.value)||0;

  const assigned=_fpLetterAssignments.slice(0,_fpLength).filter(Boolean);
  if(!assigned.length){ canvas.width=200;canvas.height=60;const ctx=canvas.getContext('2d');const g=ctx.createLinearGradient(0,0,0,60);g.addColorStop(0,bgTop);g.addColorStop(1,bgBot);ctx.fillStyle=g;ctx.fillRect(0,0,200,60); return; }

  try{
    await fpRenderToCanvas(canvas,_fpLetterAssignments.slice(0,_fpLength),size,offset,bgTop,bgBot,1800,Math.round(size*4));
  }catch(e){ /* ignore preview errors */ }
}

// Core engine: replicates ImageText.cs layout exactly
// Returns a canvas with the result drawn on it
async function fpRenderToCanvas(targetCanvas, letterNames, size, characterOffset, bgTop, bgBot, canvasW, canvasH){
  // Load all images (only the assigned ones)
  const imageCache={};
  const uniqueNames=[...new Set(letterNames.filter(Boolean))];
  await Promise.all(uniqueNames.map(name=>{
    const entry=state.inputFiles.find(f=>f.name===name);
    if(!entry) return Promise.resolve();
    return new Promise((resolve,reject)=>{
      const img=new Image();
      img.onload=()=>{ imageCache[name]=img; resolve(); };
      img.onerror=()=>reject(new Error('Failed to load '+name));
      img.src=entry.url;
    });
  }));

  // --- Layout pass (mirrors ImageText.cs SetText) ---
  let totalWidth=0, totalHeight=0;
  const letterLayouts=[]; // {img, drawW, drawH, x (before centering)}

  for(let i=0;i<letterNames.length;i++){
    const name=letterNames[i];
    if(!name || !imageCache[name]){
      // missing letter → skip (gameobject.SetActive(false) in engine)
      letterLayouts.push(null);
      continue;
    }
    const img=imageCache[name];
    const scale=size/img.naturalHeight;
    const drawW=img.naturalWidth*scale;
    const drawH=img.naturalHeight*scale; // = size
    const x=totalWidth + characterOffset*i;
    letterLayouts.push({img,drawW,drawH,x});
    totalWidth+=drawW;
    totalHeight=Math.max(totalHeight,drawH);
  }

  // Center: shift all letters left by totalWidth/2
  const centeredLayouts=letterLayouts.map(l=>{
    if(!l) return null;
    return {...l, x: l.x - totalWidth/2};
  });

  // Scale-down to fit if needed (mirrors the container scale logic in engine)
  let containerScale=1;
  if(totalWidth>canvasW || totalHeight>canvasH){
    containerScale=Math.min(canvasW/totalWidth, canvasH/totalHeight);
  }

  // Draw
  targetCanvas.width=canvasW;
  targetCanvas.height=canvasH;
  const ctx=targetCanvas.getContext('2d');

  // Gradient background
  const grad=ctx.createLinearGradient(0,0,0,canvasH);
  grad.addColorStop(0,bgTop);
  grad.addColorStop(1,bgBot);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,canvasW,canvasH);

  // Draw letters, centered in the canvas
  const originX=canvasW/2;
  const originY=canvasH/2;
  ctx.save();
  ctx.translate(originX, originY);
  ctx.scale(containerScale, containerScale);
  for(const l of centeredLayouts){
    if(!l) continue;
    // In engine: pivot is (0, 0.5) so x is left edge, y is vertical center
    ctx.drawImage(l.img, l.x, -l.drawH/2, l.drawW, l.drawH);
  }
  ctx.restore();

  return targetCanvas;
}

    <!-- Letter sequence builder -->
    <div class="fp-letter-builder">
      <div class="fp-letter-builder-header">
        <span>Letter sequence</span>
        <div class="fp-length-row">
          <label>Length</label>
          <input type="number" id="fp-length-input" value="${_fpLength}" min="1" max="32"
            oninput="fpSetLength(this.value)">
        </div>
      </div>
      <div class="fp-letter-list" id="fp-letter-list">
        <div style="font-family:var(--font-mono);font-size:.68rem;color:#444;padding:.5rem;text-align:center">
          Load PNG files first, then configure the sequence above.
        </div>
      </div>
    </div>

    <!-- Live preview -->
    <div class="fp-preview-panel">
      <div class="fp-preview-label">live preview</div>
      <div class="fp-preview-canvas-wrap">
        <canvas id="fpPreviewCanvas" width="200" height="60"
          style="max-width:100%;max-height:600px;border-radius:4px;display:block"></canvas>
      </div>
    </div>`;},

  outName(){ return 'font_preview.png'; },

  async run(_u,_n,_f,allFiles){
    const size=parseInt(document.getElementById('fp-size')?.value)||100;
    const offset=parseFloat(document.getElementById('fp-offset')?.value)||0;
    const canvasW=parseInt(document.getElementById('fp-canvas-w')?.value)||800;
    const canvasH=Math.round(size*2.5);
    const bgTop=document.getElementById('fp-bg-top')?.value||'#1a1a2e';
    const bgBot=document.getElementById('fp-bg-bot')?.value||'#16213e';
    const letters=_fpLetterAssignments.slice(0,_fpLength);

    if(!letters.some(Boolean)) throw new Error('No letters assigned — assign at least one PNG to a letter slot');

    const offscreen=document.createElement('canvas');
    await fpRenderToCanvas(offscreen,letters,size,offset,bgTop,bgBot,canvasW,canvasH);

    return new Promise((resolve,reject)=>{
      offscreen.toBlob(b=>b?resolve(b):reject(new Error('toBlob failed')),'image/png');
    });
  }
};

function fpColorChange(hiddenId,dotId,valId,hex){

  document.getElementById(dotId).style.background=hex;
  document.getElementById(valId).textContent=hex;
  fpUpdatePreview();
}

<!-- ═══ tools/slotmachine.js ═══ -->
<script>
const _sm={
  numSymbols:6,
  symbolAssignments:Array.from({length:6},()=>({name:null,img:null})),
  bg:        {name:null,img:null,scale:1.0,offX:0,offY:0},
  frameBack: {name:null,img:null,scale:1.0,offX:0,offY:0},
  frameFront:{name:null,img:null,scale:1.0,offX:0,offY:0},
  hud:       {name:null,img:null,scale:1.0,offX:0,offY:0},
  blurredCanvases:{},
  _blurSig:null,
  config:{
    reelCount:5,rowCount:3,
    symbolW:120,symbolH:120,symbolScale:1.0,
    boardScale:1.0,boardOffX:0,boardOffY:0,
    displayW:1920,displayH:1080,
    spinDirection:1,
    spinDuration:2500,stopOffset:280,spinSpeed:60,
    spinAccelMs:150,
    blurDelay:0,
    blurEnabled:true,
    blurSigma:12,blurEdgeFeather:5,
  },
  reels:[],spinning:false,animFrame:null,canvas:null,
};

/* ── Config helpers ──────────────────────────────────────── */
function smCfg(key,val){ const n=parseFloat(val); if(!isNaN(n)) _sm.config[key]=n; }
function smSetLayerImg(layer,name){
  _sm[layer].name=name||null; _sm[layer].img=null;
  if(!name) return;
  const entry=state.inputFiles.find(f=>f.name===name); if(!entry) return;
  const img=new Image(); img.onload=()=>{ _sm[layer].img=img; }; img.src=entry.url;
}
function smLayerCfg(layer,key,val){
  const n=parseFloat(val); if(!isNaN(n)) _sm[layer][key]=n;
  // sync slider<->number for scale
  if(key==='scale'){
    const sl=document.getElementById(layer+'-scale-slider'),nm=document.getElementById(layer+'-scale-num');
    const v=Math.min(3,Math.max(0,n));
    if(sl&&parseFloat(sl.value)!==v) sl.value=v;
    if(nm&&parseFloat(nm.value)!==n) nm.value=n;
  }
}

function smUpdateCalc(){
  const c=_sm.config;
  const bw=Math.round(c.symbolW*c.reelCount), bh=Math.round(c.symbolH*c.rowCount);
  const sbw=Math.round(bw*c.boardScale), sbh=Math.round(bh*c.boardScale);
  const el=document.getElementById('sm-calc');
  if(el) el.textContent='Board: '+bw+'\xd7'+bh+' px  \u2192  \xd7'+c.boardScale.toFixed(2)+' = '+sbw+'\xd7'+sbh+' px  \u00b7  Canvas: '+c.displayW+'\xd7'+c.displayH+' px';
}

/* ── Symbol library ──────────────────────────────────────── */
function smSetNumSymbols(n){
  _sm.numSymbols=Math.max(1,Math.min(20,parseInt(n)||1));
  while(_sm.symbolAssignments.length<_sm.numSymbols) _sm.symbolAssignments.push({name:null,img:null});
  while(_sm.symbolAssignments.length>_sm.numSymbols) _sm.symbolAssignments.pop();
  smRenderSymbolGrid();
}
function smRenderSymbolGrid(){
  const el=document.getElementById('sm-symbol-grid'); if(!el) return;
  if(!_sm.symbolAssignments.length||!state.inputFiles.length){
    el.innerHTML='<div style="font-family:var(--font-mono);font-size:.68rem;color:#444;padding:.5rem;text-align:center;grid-column:span 2">Load PNG files first, then assign symbols here.</div>';
    return;
  }
  el.innerHTML=_sm.symbolAssignments.map((sym,i)=>{
    const thumb=sym.img
      ?`<img src="${sym.img.src}" style="width:28px;height:28px;object-fit:contain;border-radius:2px;border:1px solid var(--border);background:#111;flex-shrink:0">`
      :'<div style="width:28px;height:28px;border:1px solid var(--border);border-radius:2px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#333;flex-shrink:0">?</div>';
    const opts='<option value="">&mdash;</option>'+
      state.inputFiles.map(f=>`<option value="${esc(f.name)}"${f.name===sym.name?' selected':''}>${esc(f.name)}</option>`).join('');
    return `<div style="display:grid;grid-template-columns:28px 1fr;gap:.3rem;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:.25rem .4rem">
      ${thumb}
      <select style="background:transparent;border:none;color:var(--muted);font-family:var(--font-mono);font-size:.65rem;outline:none;cursor:pointer;width:100%"
        onchange="smSetSymbol(${i},this.value)">${opts}</select>
    </div>`;
  }).join('');
}
function smSetSymbol(idx,name){
  if(!name){ _sm.symbolAssignments[idx]={name:null,img:null}; smRenderSymbolGrid(); return; }
  const entry=state.inputFiles.find(f=>f.name===name); if(!entry) return;
  const img=new Image();
  img.onload=()=>{ _sm.symbolAssignments[idx]={name,img}; smRenderSymbolGrid(); };
  img.src=entry.url;
}
function smUpdateSelects(){
  [['bg','sm-bg-select'],['frameBack','sm-frameback-select'],['frameFront','sm-framefront-select'],['hud','sm-hud-select']].forEach(([layer,selId])=>{
    const sel=document.getElementById(selId); if(!sel) return;
    sel.innerHTML='<option value="">&mdash; none &mdash;</option>'+
      state.inputFiles.map(f=>`<option value="${esc(f.name)}"${f.name===_sm[layer].name?' selected':''}>${esc(f.name)}</option>`).join('');
  });
}
on('filesChanged',()=>{
  for(let i=0;i<_sm.symbolAssignments.length;i++){
    const a=_sm.symbolAssignments[i];
    if(a.name&&!state.inputFiles.find(f=>f.name===a.name)) _sm.symbolAssignments[i]={name:null,img:null};
  }
  for(const layer of ['bg','frameBack','frameFront','hud']){
    if(_sm[layer].name&&!state.inputFiles.find(f=>f.name===_sm[layer].name)){_sm[layer].name=null;_sm[layer].img=null;}
  }
  if(state.currentTool==='slotmachine'){ smRenderSymbolGrid(); smUpdateSelects(); }
});

/* ── Motion-blur via ImageMagick WASM (same pipeline as ToolBlur) ────────── */
// angle=90 (vertical, matching spin direction), radius=0 always
async function smMakeBlurWasm(img, cellW, cellH, symScale){
  const c = _sm.config;
  const sigma   = c.blurSigma      || 12;
  const feather = c.blurEdgeFeather || 5;
  // Draw symbol (at symScale) centred in cell onto a temp canvas → uint8
  const tmp = document.createElement('canvas'); tmp.width=cellW; tmp.height=cellH;
  const tctx = tmp.getContext('2d');
  const sw = img.naturalWidth*symScale, sh = img.naturalHeight*symScale;
  tctx.drawImage(img, cellW/2-sw/2, cellH/2-sh/2, sw, sh);
  const uint8 = await new Promise(res=>{
    tmp.toBlob(b=>b.arrayBuffer().then(ab=>res(new Uint8Array(ab))),'image/png');
  });

  const blurArg = `0x${sigma}+90`;
  const fresh   = async b => new Uint8Array(await b.arrayBuffer());

  const r1 = await window._Magick.Call([{name:'input.png',content:uint8}],
    ['convert','input.png','-motion-blur',blurArg,'blurred.png']);
  if(!r1||!r1.length) throw new Error('Motion blur failed');
  const blurred = r1[0].blob;

  const r2 = await window._Magick.Call([{name:'blurred.png',content:await fresh(blurred)}],
    ['convert','blurred.png','-alpha','off','-fill','white','-colorize','100',
     '-shave',`${feather}x${feather}`,'-bordercolor','black','-border',`${feather}x${feather}`,
     '-blur',`0x${feather}`,'-level','20%,80%','mask.png']);
  if(!r2||!r2.length) throw new Error('Mask failed');
  const mask = r2[0].blob;

  const r3 = await window._Magick.Call([{name:'blurred.png',content:await fresh(blurred)}],
    ['convert','blurred.png','-alpha','extract','orig_alpha.png']);
  if(!r3||!r3.length) throw new Error('Alpha extract failed');
  const alpha = r3[0].blob;

  const r4 = await window._Magick.Call(
    [{name:'orig_alpha.png',content:await fresh(alpha)},{name:'mask.png',content:await fresh(mask)}],
    ['convert','orig_alpha.png','mask.png','-compose','Multiply','-composite','combined_alpha.png']);
  if(!r4||!r4.length) throw new Error('Alpha multiply failed');
  const cAlpha = r4[0].blob;

  const r5 = await window._Magick.Call(
    [{name:'blurred.png',content:await fresh(blurred)},{name:'combined_alpha.png',content:await fresh(cAlpha)}],
    ['convert','blurred.png','combined_alpha.png','-alpha','copy','-compose','CopyOpacity','-composite','output.png']);
  if(!r5||!r5.length) throw new Error('Final composite failed');

  // Return as an HTMLImageElement ready to drawImage
  return new Promise((resolve,reject)=>{
    const url = URL.createObjectURL(r5[0].blob);
    const out  = new Image();
    out.onload  = ()=>{ resolve(out); };
    out.onerror = ()=>reject(new Error('Could not load blurred image'));
    out.src = url;
  });
}

/* ── Reel helpers ────────────────────────────────────────── */
function smValidIndices(){ return _sm.symbolAssignments.map((s,i)=>s.img?i:-1).filter(i=>i>=0); }
function smRandIdx(v){ const vi=v||smValidIndices(); return vi[Math.floor(Math.random()*vi.length)]; }
function smBuildStrip(len){ const v=smValidIndices(),strip=[]; for(let i=0;i<len;i++) strip.push(smRandIdx(v)); return strip; }
function smInitReels(){
  const c=_sm.config, INIT=Math.max(64,c.rowCount*14); _sm.reels=[];
  for(let r=0;r<c.reelCount;r++)
    _sm.reels.push({strip:smBuildStrip(INIT),scrollY:0,speed:0,state:'idle',stopScrollY:0});
}
function smExtendStrip(reel,needed){
  const v=smValidIndices();
  while(reel.strip.length<=needed+28) reel.strip.push(smRandIdx(v));
}

/* ── Drawing helpers ─────────────────────────────────────── */
function smDrawLayer(ctx,layer,W,H){
  const L=_sm[layer]; if(!L||!L.img) return;
  const dw=L.img.naturalWidth*L.scale, dh=L.img.naturalHeight*L.scale;
  ctx.drawImage(L.img, W/2-dw/2+L.offX, H/2-dh/2+L.offY, dw, dh);
}
function smDrawSymInCell(ctx,symIdx,cellX,cellY,cellW,cellH,isBlurred,reelSpinStart){
  const sym=_sm.symbolAssignments[symIdx]; if(!sym||!sym.img) return;
  const c=_sm.config;
  const delayPast=c.blurDelay<=0||(performance.now()-(reelSpinStart||0))>=c.blurDelay;
  if(isBlurred&&delayPast&&_sm.blurredCanvases[symIdx]){
    ctx.drawImage(_sm.blurredCanvases[symIdx],cellX,cellY,cellW,cellH); return;
  }
  const sc=c.symbolScale;
  const sw=sym.img.naturalWidth*sc, sh=sym.img.naturalHeight*sc;
  ctx.drawImage(sym.img, cellX+cellW/2-sw/2, cellY+cellH/2-sh/2, sw, sh);
}

/* ── Main draw ───────────────────────────────────────────── */
function smDraw(){
  const c=_sm.config, canvas=_sm.canvas; if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=c.displayW, H=c.displayH;
  const reelAreaW=c.symbolW*c.reelCount, reelAreaH=c.symbolH*c.rowCount;

  ctx.clearRect(0,0,W,H);

  /* 1 — Background */
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
  if(_sm.bg.img){ smDrawLayer(ctx,'bg',W,H); }
  else { const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#12121f'); g.addColorStop(1,'#060609'); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
  ctx.restore();

  /* 2 — Frame BACK */
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
  smDrawLayer(ctx,'frameBack',W,H);
  ctx.restore();

  /* 3 — Board (reels) */
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
  ctx.translate(W/2+c.boardOffX, H/2+c.boardOffY);
  ctx.scale(c.boardScale,c.boardScale);
  const rx0=-reelAreaW/2, ry0=-reelAreaH/2;
  for(let r=0;r<_sm.reels.length&&r<c.reelCount;r++){
    const reel=_sm.reels[r];
    const isBlurred=reel.state==='spinning'||reel.state==='decelerating';
    const rx=rx0+r*c.symbolW;
    ctx.save();
    ctx.beginPath(); ctx.rect(rx,ry0,c.symbolW,reelAreaH); ctx.clip();
    const pixMod=reel.scrollY%c.symbolH;
    if(c.spinDirection===1){
      const bottomIdx=Math.floor(reel.scrollY/c.symbolH);
      for(let row=-1;row<=c.rowCount;row++){
        const sp=((bottomIdx-row)%reel.strip.length+reel.strip.length)%reel.strip.length;
        const sy=ry0+row*c.symbolH+pixMod;
        if(sy+c.symbolH<ry0||sy>ry0+reelAreaH) continue;
        smDrawSymInCell(ctx,reel.strip[sp],rx,sy,c.symbolW,c.symbolH,isBlurred,reel.spinStartTime||0);
      }
    } else {
      const topIdx=Math.floor(reel.scrollY/c.symbolH);
      for(let row=-1;row<=c.rowCount;row++){
        const sp=((topIdx+row)%reel.strip.length+reel.strip.length)%reel.strip.length;
        const sy=ry0+row*c.symbolH-pixMod;
        if(sy+c.symbolH<ry0||sy>ry0+reelAreaH) continue;
        smDrawSymInCell(ctx,reel.strip[sp],rx,sy,c.symbolW,c.symbolH,isBlurred,reel.spinStartTime||0);
      }
    }
    if(r>0){ ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(rx+0.75,ry0); ctx.lineTo(rx+0.75,ry0+reelAreaH); ctx.stroke(); }
    ctx.restore();
  }
  const midY=ry0+Math.floor(c.rowCount/2)*c.symbolH;
  ctx.strokeStyle='rgba(255,118,46,0.18)'; ctx.lineWidth=2;
  ctx.strokeRect(rx0+1,midY+1,reelAreaW-2,c.symbolH-2);
  ctx.strokeStyle='rgba(255,118,46,0.06)'; ctx.lineWidth=1;
  ctx.strokeRect(rx0,ry0,reelAreaW,reelAreaH);
  ctx.restore();

  /* 4 — Frame FRONT */
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
  smDrawLayer(ctx,'frameFront',W,H);
  ctx.restore();

  /* 5 — HUD overlay */
  ctx.save(); ctx.beginPath(); ctx.rect(0,0,W,H); ctx.clip();
  smDrawLayer(ctx,'hud',W,H);
  ctx.restore();
}

/* ── Spin logic ──────────────────────────────────────────── */
function smSpin(){
  if(_sm.spinning) return;
  if(!smValidIndices().length){ log('\u2717 Assign at least one symbol','err'); return; }
  if(!_sm.canvas){ log('\u2717 Launch machine first','err'); return; }
  _sm.spinning=true; smUpdateSpinBtn(false);
  const c=_sm.config;
  const now=performance.now();
  for(const reel of _sm.reels){ reel.state='spinning'; reel.speed=0; reel.spinStartTime=now; }
  for(let r=0;r<_sm.reels.length;r++) setTimeout(()=>smStopReel(r), c.spinDuration+r*c.stopOffset);
  if(_sm.animFrame) cancelAnimationFrame(_sm.animFrame);
  smAnimLoop();
}
function smStopReel(r){
  const reel=_sm.reels[r]; if(!reel||reel.state==='stopped') return;
  const c=_sm.config;
  const extra=(3+Math.floor(Math.random()*4))*c.symbolH;
  const rawTarget=reel.scrollY+reel.speed*30+extra;
  reel.stopScrollY=Math.ceil(rawTarget/c.symbolH)*c.symbolH;
  smExtendStrip(reel,Math.floor(reel.stopScrollY/c.symbolH)+c.rowCount+8);
  reel.state='decelerating';
}
function smAnimLoop(){
  if(!_sm.canvas) return;
  const c=_sm.config; let anyActive=false;
  for(const reel of _sm.reels){
    if(reel.state==='idle'||reel.state==='stopped') continue;
    anyActive=true;
    if(reel.state==='spinning'){
      const elapsed=performance.now()-(reel.spinStartTime||0);
      const accelFrac=c.spinAccelMs>0?Math.min(1,elapsed/c.spinAccelMs):1;
      reel.speed=c.spinSpeed*accelFrac;
      reel.scrollY+=reel.speed;
      smExtendStrip(reel,Math.floor(reel.scrollY/c.symbolH)+c.rowCount+8);
    } else if(reel.state==='decelerating'){
      const remaining=reel.stopScrollY-reel.scrollY;
      if(remaining<=0.5){
        reel.scrollY=reel.stopScrollY; reel.speed=0; reel.state='stopped';
        if(_sm.reels.every(r2=>r2.state==='stopped'||r2.state==='idle')){ _sm.spinning=false; smUpdateSpinBtn(true); }
        continue;
      }
      const ts=Math.max(1.2,remaining/20);
      reel.speed=reel.speed*0.88+ts*0.12; reel.speed=Math.max(reel.speed,1.2);
      reel.scrollY+=reel.speed;
      if(reel.scrollY>=reel.stopScrollY){
        reel.scrollY=reel.stopScrollY; reel.speed=0; reel.state='stopped';
        if(_sm.reels.every(r2=>r2.state==='stopped'||r2.state==='idle')){ _sm.spinning=false; smUpdateSpinBtn(true); }
      }
    }
  }
  smDraw();
  if(anyActive) _sm.animFrame=requestAnimationFrame(smAnimLoop);
}
function smUpdateSpinBtn(enabled){
  const btn=document.getElementById('sm-spin-btn'); if(!btn) return;
  btn.disabled=!enabled;
  btn.innerHTML=enabled?'\ud83c\udfb0\u2002 SPIN':'\u23f3\u2002 spinning\u2026';
}

/* ── Launch ──────────────────────────────────────────────── */
async function smLaunch(){
  const c=_sm.config;
  const valid=smValidIndices();
  if(!valid.length){ log('\u2717 Assign at least one symbol first','err'); return; }
  if(!state.magickReady){ log('\u2717 ImageMagick WASM not ready yet','err'); return; }
  smUpdateCalc();
  const runBtn=document.getElementById('runBtn');

  // ── Blur signature: sigma + feather + ordered symbol names ──
  if(!c.blurEnabled){
    _sm.blurredCanvases={}; _sm._blurSig=null;
    log('\u2014 Blur disabled \u2014 skipping pre-process','info');
  } else {
    const blurSig = [c.blurSigma, c.blurEdgeFeather, c.symbolScale,
      ..._sm.symbolAssignments.map(s=>s.name||'')].join('|');
    if(blurSig === _sm._blurSig && Object.keys(_sm.blurredCanvases).length){
      log('\u2713 Blur cache valid \u2014 skipping re-process','info');
    } else {
      if(runBtn){ runBtn.disabled=true; runBtn.innerHTML='\u29D7 building\u2026'; }
      _sm.blurredCanvases={};
      const symsToDo=_sm.symbolAssignments.filter(s=>s.img);
      log(`\u29D7 Building blurred symbols (${symsToDo.length}) via ImageMagick\u2026`,'info');
      for(let i=0;i<_sm.symbolAssignments.length;i++){
        const sym=_sm.symbolAssignments[i];
        if(!sym.img) continue;
        try{
          log(`  processing symbol ${i+1}: ${sym.name||'?'}`,'');
          _sm.blurredCanvases[i]=await smMakeBlurWasm(sym.img,c.symbolW,c.symbolH,c.symbolScale);
        }catch(e){
          log(`  \u2717 symbol ${i+1} blur failed: ${e.message}`,'err');
        }
      }
      _sm._blurSig = blurSig;
      log('\u2713 Blur pre-processing done','ok');
    }
  }

  const area=document.getElementById('resultsArea');
  area.innerHTML='';
  if(_sm.animFrame) cancelAnimationFrame(_sm.animFrame);
  _sm.spinning=false;

  const wrap=document.createElement('div');
  wrap.style.cssText='display:flex;flex-direction:column;align-items:center;gap:1rem;padding:1.25rem';
  wrap.style.cursor='pointer';
  wrap.addEventListener('click', e=>{ if(!_sm.spinning) smSpin(); });

  const canvas=document.createElement('canvas');
  canvas.width=c.displayW; canvas.height=c.displayH;
  canvas.style.cssText='max-width:100%;border-radius:8px;border:1px solid var(--border);display:block;box-shadow:0 6px 40px rgba(0,0,0,.6)';
  canvas.title='Click to spin';

  const controls=document.createElement('div');
  controls.style.cssText='display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;justify-content:center';
  controls.addEventListener('click', e=>e.stopPropagation());

  const spinBtn=document.createElement('button');
  spinBtn.id='sm-spin-btn'; spinBtn.className='btn btn-primary';
  spinBtn.style.cssText='font-size:.88rem;padding:.6rem 2.2rem;letter-spacing:.06em;min-width:150px';
  spinBtn.innerHTML='\ud83c\udfb0\u2002 SPIN';
  spinBtn.addEventListener('click', e=>{ e.stopPropagation(); smSpin(); });

  const hint=document.createElement('span');
  hint.style.cssText='font-family:var(--font-mono);font-size:.6rem;color:#444';
  hint.textContent='or click anywhere in the preview';

  controls.appendChild(spinBtn); controls.appendChild(hint);
  wrap.appendChild(canvas); wrap.appendChild(controls);
  area.appendChild(wrap);

  document.getElementById('resultCount').textContent='live preview';
  document.getElementById('dlBar').style.display='none';
  _sm.canvas=canvas; smInitReels(); smDraw();
  log('\ud83c\udfb0 Machine ready \u2014 click anywhere to spin!','ok');

  if(runBtn){ runBtn.disabled=false; runBtn.innerHTML='\ud83c\udfb0 BUILD MACHINE'; }
}

/* ── Settings HTML ───────────────────────────────────────── */
const ToolSlotMachine={
  meta:{
    id:'slotmachine',label:'Slot Machine',small:'spin & preview simulator',
    icon:'\ud83c\udfb0',needsMagick:false,batchMode:false,isSlotMachine:true,
    desc:'Preview a slot machine with your own symbols, background, frames and HUD. Hit <strong>BUILD MACHINE</strong> to preprocess blur via ImageMagick WASM, then click anywhere to spin.'
  },
  settingsHTML(){
    const c=_sm.config;
    // Compact number input
    const fi=(id,lbl,val,min,max,step,cb)=>
      `<div class="field"><label>${lbl}</label><input type="number" id="${id}" value="${val}" min="${min}" max="${max}" step="${step||1}" style="font-size:.74rem;padding:.3rem .45rem" oninput="${cb}"></div>`;
    // Slider with live readout
    const fr=(id,lbl,val,min,max,step,spanId,cb)=>
      `<div class="field"><label>${lbl} &mdash; <span id="${spanId}" style="color:var(--accent)">${val}</span></label>
       <input type="range" id="${id}" value="${val}" min="${min}" max="${max}" step="${step}" style="accent-color:var(--accent)" oninput="${cb}"></div>`;
    // Layer block: image picker + scale slider+number + offX + offY
    const layerBlock=(layer,title,selId)=>{
      const L=_sm[layer];
      const scaleSliderMax=3;
      const opts='<option value="">&mdash; none &mdash;</option>'+
        state.inputFiles.map(f=>`<option value="${esc(f.name)}"${f.name===L.name?' selected':''}>${esc(f.name)}</option>`).join('');
      return `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:.55rem .7rem;display:flex;flex-direction:column;gap:.45rem">
        <span style="font-family:var(--font-mono);font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">${title}</span>
        <select id="${selId}" onchange="smSetLayerImg('${layer}',this.value)"
          style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:.7rem;padding:.35rem .45rem;border-radius:4px;outline:none;width:100%">${opts}</select>
        <div style="display:flex;align-items:center;gap:.4rem">
          <label style="font-family:var(--font-mono);font-size:.6rem;color:var(--muted);white-space:nowrap;min-width:38px">Scale</label>
          <input type="range" id="${layer}-scale-slider" value="${Math.min(scaleSliderMax,L.scale)}" min="0" max="${scaleSliderMax}" step="0.01"
            style="flex:1;accent-color:var(--accent);cursor:pointer"
            oninput="smLayerCfg('${layer}','scale',this.value)">
          <input type="number" id="${layer}-scale-num" value="${L.scale}" min="0" max="20" step="0.05"
            style="width:54px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:.7rem;padding:.28rem .4rem;border-radius:4px;outline:none"
            oninput="smLayerCfg('${layer}','scale',this.value)">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:.35rem">
          ${fi(layer+'-offx','Off X',L.offX,-9999,9999,1,"smLayerCfg('"+layer+"','offX',this.value)")}
          ${fi(layer+'-offy','Off Y',L.offY,-9999,9999,1,"smLayerCfg('"+layer+"','offY',this.value)")}
        </div>
      </div>`;
    };
    const bw=Math.round(c.symbolW*c.reelCount), bh=Math.round(c.symbolH*c.rowCount);
    const sbw=Math.round(bw*c.boardScale), sbh=Math.round(bh*c.boardScale);
    return `
    <!-- ── Symbol library ── -->
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.4rem">
      <span style="font-family:var(--font-mono);font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">Symbol library</span>
      <div style="display:flex;align-items:center;gap:.4rem">
        <label style="font-family:var(--font-mono);font-size:.63rem;color:var(--muted)">Count</label>
        <input type="number" id="sm-num-symbols" value="${_sm.numSymbols}" min="1" max="20"
          style="width:52px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:.76rem;padding:.28rem .45rem;border-radius:4px;outline:none"
          oninput="smSetNumSymbols(this.value)">
      </div>
    </div>
    <div id="sm-symbol-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:.35rem;max-height:200px;overflow-y:auto">
      <div style="font-family:var(--font-mono);font-size:.65rem;color:#444;padding:.5rem;text-align:center;grid-column:span 2">Load PNG files first.</div>
    </div>

    <div style="height:1px;background:var(--border)"></div>

    <!-- ── Layers: background full-width, then 2-col for frames, then 2-col for board/HUD ── -->
    ${layerBlock('bg','Background','sm-bg-select')}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.55rem">
      ${layerBlock('frameBack','Frame — Behind','sm-frameback-select')}
      ${layerBlock('frameFront','Frame — Front','sm-framefront-select')}
    </div>
    ${layerBlock('hud','HUD Overlay (topmost)','sm-hud-select')}

    <div style="height:1px;background:var(--border)"></div>

    <!-- ── Reel grid ── -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:.5rem">
      ${fi('sm-reel-count','Reels',c.reelCount,1,9,1,"smCfg('reelCount',this.value);smUpdateCalc()")}
      ${fi('sm-row-count','Rows',c.rowCount,1,8,1,"smCfg('rowCount',this.value);smUpdateCalc()")}
      ${fi('sm-sym-w','Cell W',c.symbolW,16,512,1,"smCfg('symbolW',this.value);smUpdateCalc()")}
      ${fi('sm-sym-h','Cell H',c.symbolH,16,512,1,"smCfg('symbolH',this.value);smUpdateCalc()")}
    </div>
    ${fr('sm-sym-scale','Symbol scale in cell',c.symbolScale.toFixed(2),0,3,0.01,'sm-sym-scale-val',
      "smCfg('symbolScale',parseFloat(this.value));document.getElementById('sm-sym-scale-val').textContent=parseFloat(this.value).toFixed(2)")}

    <div style="height:1px;background:var(--border)"></div>

    <!-- ── Canvas + board transform ── -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
      ${fi('sm-disp-w','Canvas W (px)',c.displayW,200,3840,1,"smCfg('displayW',this.value);smUpdateCalc()")}
      ${fi('sm-disp-h','Canvas H (px)',c.displayH,200,2160,1,"smCfg('displayH',this.value);smUpdateCalc()")}
    </div>
    ${fr('sm-board-scale','Board scale',c.boardScale.toFixed(2),0,3,0.01,'sm-board-scale-val',
      "smCfg('boardScale',parseFloat(this.value));document.getElementById('sm-board-scale-val').textContent=parseFloat(this.value).toFixed(2);smUpdateCalc()")}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
      ${fi('sm-board-offx','Board offset X',c.boardOffX,-4000,4000,1,"smCfg('boardOffX',this.value)")}
      ${fi('sm-board-offy','Board offset Y',c.boardOffY,-4000,4000,1,"smCfg('boardOffY',this.value)")}
    </div>
    <div id="sm-calc" style="font-family:var(--font-mono);font-size:.62rem;color:var(--accent2);background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:.35rem .65rem">
      Board: ${bw}&times;${bh} px &rarr; &times;${c.boardScale.toFixed(2)} = ${sbw}&times;${sbh} px &middot; Canvas: ${c.displayW}&times;${c.displayH} px
    </div>

    <div style="height:1px;background:var(--border)"></div>

    <!-- ── Spin settings ── -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
      <div class="field"><label>Spin direction</label>
        <select id="sm-spin-dir" onchange="smCfg('spinDirection',parseInt(this.value))"
          style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:.76rem;padding:.3rem .45rem;border-radius:4px;outline:none;width:100%">
          <option value="1" ${c.spinDirection===1?'selected':''}>&#8595; Down</option>
          <option value="-1" ${c.spinDirection===-1?'selected':''}>&#8593; Up</option>
        </select>
      </div>
      ${fi('sm-spin-dur','Spin duration (ms)',c.spinDuration,300,15000,100,"smCfg('spinDuration',this.value)")}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
      ${fi('sm-stop-offset','Stop offset/reel (ms)',c.stopOffset,0,3000,50,"smCfg('stopOffset',this.value)")}
      ${fi('sm-spin-accel','Accel ramp (ms, 0=instant)',c.spinAccelMs,0,2000,10,"smCfg('spinAccelMs',this.value)")}
    </div>
    ${fr('sm-spin-speed','Spin speed (px/frame)',c.spinSpeed,5,200,1,'sm-spin-speed-val',
      "smCfg('spinSpeed',this.value);document.getElementById('sm-spin-speed-val').textContent=this.value")}

    <div style="height:1px;background:var(--border)"></div>

    <!-- ── Blur settings ── -->
    <label style="display:flex;align-items:center;gap:.55rem;cursor:pointer;font-family:var(--font-mono);font-size:.7rem;color:var(--muted);user-select:none">
      <input type="checkbox" id="sm-blur-enabled" ${c.blurEnabled?'checked':''} onchange="smCfg('blurEnabled',this.checked?1:0)"
        style="accent-color:var(--accent);width:14px;height:14px;cursor:pointer">
      Enable motion blur (requires rebuild)
    </label>
    ${fi('sm-blur-delay','Blur start delay (ms after spin)',c.blurDelay,0,5000,10,"smCfg('blurDelay',this.value)")}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
      ${fi('sm-blur-sigma','Sigma / strength',c.blurSigma,1,100,1,"smCfg('blurSigma',this.value)")}
      ${fi('sm-blur-feather','Edge feather (px)',c.blurEdgeFeather,0,100,1,"smCfg('blurEdgeFeather',this.value)")}
    </div>`;
  },
  outName(){ return 'slot_preview.png'; },
  async run(){ smLaunch(); },
};
</script>


<!-- ═══ app.js ═══ -->
<script>
const TOOLS=[ToolCrop,ToolBlur,ToolWebp,ToolRgba,ToolFontPreview,ToolSlotMachine];

/* Build UI */
(function(){
  const tabsEl=document.getElementById('toolTabs'),settingsEl=document.getElementById('settingsBody');
  const actionRow=settingsEl.querySelector('.action-row');
  TOOLS.forEach(tool=>{
    const {id,label,small,icon,desc}=tool.meta;
    const btn=document.createElement('button');
    btn.className='tool-tab'; btn.id='tab-'+id;
    btn.innerHTML=`<span class="icon">${icon}</span><span class="label">${label}<small>${small}</small></span>`;
    btn.addEventListener('click',()=>switchTool(id));
    tabsEl.appendChild(btn);
    const sec=document.createElement('div');
    sec.className='tool-section'; sec.id='section-'+id;
    sec.innerHTML=`<p class="tool-desc">${desc}</p>${tool.settingsHTML()}`;
    settingsEl.insertBefore(sec,actionRow);
  });
  switchTool('crop');
})();

function switchTool(id){
  state.currentTool=id;
  const tool=TOOLS.find(t=>t.meta.id===id);
  document.querySelectorAll('.tool-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tool-section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+id)?.classList.add('active');
  document.getElementById('section-'+id)?.classList.add('active');
  document.getElementById('toolName').textContent=tool?.meta.label||id;
  if(id==='rgba') rgbaRender();
  if(id==='fontpreview') fpRenderLetterList();
  if(id==='crop') cropUpdateModeHint();
  if(id==='slotmachine'){ smRenderSymbolGrid(); smUpdateSelects(); }

  const runBtn=document.getElementById('runBtn');
  if(id==='fontpreview'){
    runBtn.disabled=false; runBtn.innerHTML='&#9654; RUN';
  } else if(id==='slotmachine'){
    runBtn.disabled=false; runBtn.innerHTML='🎰 BUILD MACHINE';
  } else {
    runBtn.innerHTML='&#9654; RUN'; updateRunBtn();
  }
}

/* File drop */
const dropzone=document.getElementById('dropzone'),fileInput=document.getElementById('fileInput');
dropzone.addEventListener('dragover',e=>{e.preventDefault();dropzone.classList.add('drag-over');});
dropzone.addEventListener('dragleave',()=>dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop',e=>{
  e.preventDefault(); dropzone.classList.remove('drag-over');
  addFiles([...e.dataTransfer.files].filter(f=>f.type==='image/png'||f.name.endsWith('.png')));
});
fileInput.addEventListener('change',()=>{addFiles([...fileInput.files]);fileInput.value='';});

function addFiles(files){
  for(const f of files){ if(state.inputFiles.find(x=>x.name===f.name)) continue; state.inputFiles.push({name:f.name,file:f,url:URL.createObjectURL(f)}); }
  renderFileList(); updateRunBtn();
  // If font preview or slot machine active, re-enable run immediately
  if(state.currentTool==='fontpreview'||state.currentTool==='slotmachine') document.getElementById('runBtn').disabled=false;
}
function removeFile(name){
  const idx=state.inputFiles.findIndex(x=>x.name===name);
  if(idx!==-1){URL.revokeObjectURL(state.inputFiles[idx].url);state.inputFiles.splice(idx,1);}
  renderFileList(); updateRunBtn();
  if(state.currentTool==='fontpreview'||state.currentTool==='slotmachine') document.getElementById('runBtn').disabled=false;
}

document.getElementById('clearBtn').addEventListener('click',clearResults);
document.getElementById('dlAllBtn').addEventListener('click',downloadAll);

document.getElementById('runBtn').addEventListener('click',async()=>{
  const tool=TOOLS.find(t=>t.meta.id===state.currentTool);

  // Slot machine: delegate entirely to smLaunch
  if(tool?.meta.isSlotMachine){ clearLog(); await tool.run(); return; }

  // Font preview doesn't need input files to start
  if(state.currentTool!=='fontpreview' && !state.inputFiles.length) return;

  clearLog(); state.outputFiles.forEach(f=>URL.revokeObjectURL(f.url)); state.outputFiles=[];
  document.getElementById('resultsArea').innerHTML='<div class="empty-state">processing\u2026</div>';
  document.getElementById('resultCount').textContent='0 files';
  document.getElementById('dlBar').style.display='none';
  const btn=document.getElementById('runBtn'); btn.disabled=true;
  log(`Running ${tool.meta.label}`+(state.inputFiles.length?` on ${state.inputFiles.length} file(s)`:''),'info');
  try{
    if(tool.meta.batchMode){
      document.getElementById('progressLabel').textContent='compositing\u2026';
      const blob=await tool.run(null,null,null,state.inputFiles),outname=tool.outName();
      state.outputFiles.push({name:outname,blob,url:URL.createObjectURL(blob)});
      log(`\u2713 \u2192 ${outname}`,'ok');
      document.getElementById('progressLabel').textContent='done \u2014 1 file';
    } else {
      for(let i=0;i<state.inputFiles.length;i++){
        const {name,file}=state.inputFiles[i];
        document.getElementById('progressLabel').textContent=`${i+1} / ${state.inputFiles.length}`;
        try{
          const uint8=new Uint8Array(await file.arrayBuffer()),blob=await tool.run(uint8,name,file),outname=tool.outName(name);
          state.outputFiles.push({name:outname,blob,url:URL.createObjectURL(blob)});
          log(`\u2713 ${name} \u2192 ${outname}`,'ok');
        }catch(e){ log(`\u2717 ${name}: ${e.message||e}`,'err'); }
      }
      document.getElementById('progressLabel').textContent=`done \u2014 ${state.outputFiles.length} file(s)`;
    }
  }catch(e){ log(`\u2717 ${e.message||e}`,'err'); }
  btn.disabled=false;
  if(state.currentTool==='fontpreview') btn.disabled=false;
  renderResults();
});
</script>

<!-- ═══ WASM loader — type="module" required for import * syntax ═══ -->
<script type="module">
  import * as Magick from 'https://knicknic.github.io/wasm-imagemagick/magickApi.js';
  window._Magick = Magick;
  state.magickReady = true;
  setBadge('ready', 'wasm ready');
  updateRunBtn();
  clearLog();
  log('ImageMagick WASM loaded \u2014 no local install needed', 'info');
  log('Drop PNG files on the left, choose a tool and hit RUN.', 'info');
</script>
